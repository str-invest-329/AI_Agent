<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financials Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --bg: #f7f8fa;
  --card: #fff;
  --border: #e2e5ea;
  --header-bg: #1f4e79;
  --header-fg: #fff;
  --section-bg: #d6e4f0;
  --section-fg: #1f4e79;
  --total-bg: #fff8e1;
  --total-fg: #7b3f00;
  --alt-row: #f2f8fd;
  --positive: #1b7a3d;
  --negative: #c0392b;
  --derived-bg: #e2efda;
  --tab-active: #1f4e79;
  --tab-hover: #2a6da8;
  --text: #2c3e50;
  --muted: #7f8c8d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }

.topbar {
  background: var(--header-bg);
  color: var(--header-fg);
  padding: 12px 24px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.topbar h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
.topbar select {
  padding: 6px 12px; border-radius: 4px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
  background: rgba(255,255,255,0.15); color: #fff;
}
.topbar select option { color: #333; background: #fff; }
.topbar .meta { font-size: 12px; color: rgba(255,255,255,0.7); margin-left: auto; }

.tabs {
  display: flex; gap: 0; background: #fff;
  border-bottom: 2px solid var(--border);
  padding: 0 24px;
  position: sticky; top: 48px; z-index: 99;
}
.tab {
  padding: 10px 20px; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all 0.15s;
  user-select: none;
}
.tab:hover { color: var(--tab-hover); }
.tab.active { color: var(--tab-active); border-bottom-color: var(--tab-active); font-weight: 700; }

.container { padding: 16px 24px; max-width: 100%; overflow-x: auto; }

.table-wrapper { overflow-x: auto; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

table {
  width: 100%; border-collapse: collapse;
  background: var(--card); font-size: 12px;
}
th, td {
  padding: 6px 12px; border: 1px solid var(--border);
  white-space: nowrap;
}
th {
  background: var(--header-bg); color: var(--header-fg);
  font-weight: 600; text-align: center;
  position: sticky; top: 0; z-index: 10;
}
th.metric-col {
  text-align: left; min-width: 260px;
  position: sticky; left: 0; z-index: 11;
}
td.metric-name {
  text-align: left; font-weight: 500;
  position: sticky; left: 0; z-index: 5;
  background: inherit;
}
td.val { text-align: right; font-variant-numeric: tabular-nums; }
td.val.negative { color: var(--negative); }
td.val.positive-highlight { color: var(--positive); }
td.val.null-val { color: var(--muted); text-align: center; }

tr.section-row td {
  background: var(--section-bg); color: var(--section-fg);
  font-weight: 700; font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.5px;
}
tr.total-row td { background: var(--total-bg); font-weight: 700; color: var(--total-fg); }
tr.total-row td.metric-name { font-weight: 700; }
tr:nth-child(even):not(.section-row):not(.total-row) td { background: var(--alt-row); }
tr:nth-child(even):not(.section-row):not(.total-row) td.metric-name { background: var(--alt-row); }
tr:nth-child(odd):not(.section-row):not(.total-row) td { background: var(--card); }
tr:nth-child(odd):not(.section-row):not(.total-row) td.metric-name { background: var(--card); }

.loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
.empty { text-align: center; padding: 40px; color: var(--muted); }
.period-end { display: block; font-size: 10px; font-weight: 400; color: rgba(255,255,255,0.7); }

/* Tag Audit styles */
.audit-card {
  background: var(--card); border-radius: 6px; padding: 16px;
  margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  border-left: 4px solid var(--header-bg);
}
.audit-card.multi-tag { border-left-color: #e67e22; }
.audit-card.llm-inferred { border-left-color: #8e44ad; }
.audit-metric { font-size: 14px; font-weight: 700; color: var(--header-bg); margin-bottom: 8px; }
.audit-tag {
  display: flex; align-items: flex-start; gap: 8px; padding: 8px 12px;
  background: var(--bg); border-radius: 4px; margin-bottom: 6px; font-size: 12px;
}
.audit-tag:last-child { margin-bottom: 0; }
.audit-badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.badge-known { background: #27ae60; }
.badge-label { background: #2980b9; }
.badge-llm { background: #8e44ad; }
.audit-tag-name { font-family: 'SF Mono', Menlo, monospace; font-size: 11px; color: #555; word-break: break-all; }
.audit-label { color: var(--text); font-weight: 500; }
.audit-periods { color: var(--muted); font-size: 11px; margin-top: 4px; }
.audit-reasoning { color: #8e44ad; font-style: italic; font-size: 11px; margin-top: 4px; }
.audit-confidence { color: var(--muted); font-size: 11px; }
.audit-section-title {
  font-size: 13px; font-weight: 700; color: var(--section-fg); background: var(--section-bg);
  padding: 8px 16px; border-radius: 4px; margin: 16px 0 8px 0;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.audit-legend {
  display: flex; gap: 16px; padding: 12px 0; font-size: 12px; color: var(--muted);
  border-bottom: 1px solid var(--border); margin-bottom: 12px;
}
.audit-legend-item { display: flex; align-items: center; gap: 4px; }

/* Ratio tooltip */
.ratio-metric-name { position: relative; cursor: help; }
.ratio-metric-name .ratio-tip {
  display: none; position: absolute; left: 100%; top: 50%; transform: translateY(-50%);
  margin-left: 8px; background: #2c3e50; color: #fff; padding: 6px 10px;
  border-radius: 4px; font-size: 11px; font-weight: 400; white-space: nowrap;
  z-index: 50; pointer-events: none; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.ratio-metric-name:hover .ratio-tip { display: block; }

/* Chart area */
.ratio-chart-wrapper {
  background: var(--card); border-radius: 6px; padding: 16px;
  margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.ratio-chart-controls {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; align-items: center;
}
.ratio-chip {
  padding: 4px 12px; border-radius: 14px; font-size: 12px; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg); color: var(--text);
  transition: all 0.15s; user-select: none;
}
.ratio-chip.active { background: var(--header-bg); color: #fff; border-color: var(--header-bg); }
.ratio-chip:hover:not(.active) { border-color: var(--tab-hover); color: var(--tab-hover); }
#ratioChart { max-height: 340px; }

/* View mode toggle */
.view-toggle {
  display: flex; gap: 0; margin-left: 16px;
}
.view-toggle button {
  padding: 4px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.3); background: transparent; color: rgba(255,255,255,0.7);
  transition: all 0.15s;
}
.view-toggle button:first-child { border-radius: 4px 0 0 4px; }
.view-toggle button:last-child { border-radius: 0 4px 4px 0; border-left: none; }
.view-toggle button.active { background: rgba(255,255,255,0.2); color: #fff; }

@media (max-width: 768px) {
  .topbar { padding: 8px 12px; }
  .tabs { padding: 0 12px; }
  .container { padding: 8px 12px; }
  th, td { padding: 4px 6px; font-size: 11px; }
  th.metric-col { min-width: 180px; }
}
</style>
</head>
<body>

<div class="topbar">
  <a href="../Portal/" style="color:#fff;text-decoration:none;font-size:0.85rem;opacity:0.7;transition:opacity .2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">← Portal</a>
  <h1>Financials Viewer</h1>
  <select id="ticker-select"><option value="">-- Select Ticker --</option></select>
  <div class="view-toggle" id="view-toggle">
    <button class="active" data-mode="quarterly">Quarterly</button>
    <button data-mode="annual">Annual</button>
  </div>
  <div class="meta" id="meta-info"></div>
</div>

<div class="tabs" id="tabs"></div>

<div class="container" id="content">
  <div class="loading">Select a ticker to view financial statements.</div>
</div>

<script>
const PERIOD_ORDER_WEIGHT = (p) => {
  const m = p.match(/Q(\d+)_FY(\d+)/);
  if (m) return parseInt(m[2]) * 10 + parseInt(m[1]);
  const fy = p.match(/^FY(\d+)$/);
  if (fy) return parseInt(fy[1]) * 10 + 5; // sort after Q4 of previous FY
  if (p.includes('START')) return -1;
  return 0;
};

const sortPeriods = (periods) => [...periods].sort((a, b) => PERIOD_ORDER_WEIGHT(a) - PERIOD_ORDER_WEIGHT(b));

const TOTAL_KEYS = new Set([
  'revenue', 'gross_profit', 'gross_margin', 'operating_income', 'income_before_taxes',
  'net_income', 'total_current_assets', 'total_assets', 'total_current_liabilities',
  'total_liabilities', 'total_equity', 'total_liabilities_and_equity',
  'net_cash_from_operating', 'net_cash_from_operating_activities',
  'net_cash_from_investing', 'net_cash_used_for_investing_activities',
  'net_cash_from_financing', 'net_cash_used_for_financing_activities',
  'net_cash_from_financing_activities',
  'free_cash_flow', 'ending_cash', 'current_ratio',
  'eps_diluted',
]);

const isPct = (key) => key.includes('pct') || key.includes('rate') || key === 'equity_ratio' || key === 'roe' || key === 'roa' || key === 'asset_turnover';
const isEps = (key) => key.startsWith('eps');

function fmtVal(val, key) {
  if (val === null || val === undefined) return { text: '—', cls: 'null-val' };
  if (isPct(key)) return { text: (val * 100).toFixed(1) + '%', cls: val < 0 ? 'negative' : '' };
  if (isEps(key)) return { text: '$' + val.toFixed(2), cls: val < 0 ? 'negative' : '' };
  if (key.includes('ratio') || key === 'debt_to_equity' || key === 'net_debt_to_equity')
    return { text: val.toFixed(2), cls: '' };
  const neg = val < 0;
  const abs = Math.abs(val);
  const text = abs >= 1 ? abs.toLocaleString('en-US', { maximumFractionDigits: 1 }) : abs.toFixed(2);
  return { text: neg ? `(${text})` : text, cls: neg ? 'negative' : '' };
}

function labelFor(key) {
  return LABEL_MAP[key] || key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function getPeriodEnd(data, period) {
  const f = data.filings?.[period];
  if (f?.period_end) return f.period_end;
  return '';
}

// ── Render helpers ──

function buildTable(periods, rows, data) {
  if (!rows.length) return '<div class="empty">No data available for this section.</div>';
  let html = '<div class="table-wrapper"><table><thead><tr>';
  html += '<th class="metric-col">Metric</th>';
  for (const p of periods) {
    const end = getPeriodEnd(data, p);
    html += `<th>${p}${end ? `<span class="period-end">${end}</span>` : ''}</th>`;
  }
  html += '</tr></thead><tbody>';
  for (const row of rows) {
    if (row.type === 'section') {
      html += `<tr class="section-row"><td colspan="${periods.length + 1}">${row.label}</td></tr>`;
      continue;
    }
    const isTotal = TOTAL_KEYS.has(row.key);
    html += `<tr class="${isTotal ? 'total-row' : ''}">`;
    html += `<td class="metric-name">${row.label}</td>`;
    for (const p of periods) {
      const v = row.vals?.[p];
      const f = fmtVal(v, row.key);
      html += `<td class="val ${f.cls}">${f.text}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  return html;
}

// ── Tab renderers ──

function renderIncomeStatement(data) {
  const periods = sortPeriods(data.metadata.periods_income_statement || data.metadata.periods || []);
  const IS = data.income_statement || {};
  const rows = Object.keys(IS).map(key => ({ key, label: labelFor(key), vals: IS[key] }));
  return buildTable(periods, rows, data);
}

function renderBalanceSheet(data) {
  const periods = sortPeriods(data.metadata.periods_balance_sheet || data.metadata.periods || []);
  const BS = data.balance_sheet || {};
  const rows = [];
  for (const [secKey, secLabel] of [['assets', 'ASSETS'], ['liabilities', 'LIABILITIES'], ['equity', 'EQUITY']]) {
    const sec = BS[secKey];
    if (!sec) continue;
    rows.push({ type: 'section', label: secLabel });
    for (const key of Object.keys(sec)) {
      rows.push({ key, label: labelFor(key), vals: sec[key] });
    }
  }
  return buildTable(periods, rows, data);
}

function renderCashFlow(data) {
  const periods = sortPeriods(data.metadata.periods_income_statement || data.metadata.periods || []);
  const CF = data.cash_flow_statement || {};
  const rows = [];
  for (const [secKey, secLabel] of [
    ['operating_activities', 'OPERATING ACTIVITIES'],
    ['investing_activities', 'INVESTING ACTIVITIES'],
    ['financing_activities', 'FINANCING ACTIVITIES'],
  ]) {
    const sec = CF[secKey];
    if (!sec) continue;
    rows.push({ type: 'section', label: secLabel });
    for (const key of Object.keys(sec)) {
      if (typeof sec[key] === 'object' && sec[key] !== null && !Array.isArray(sec[key])) {
        rows.push({ key, label: labelFor(key), vals: sec[key] });
      }
    }
  }
  rows.push({ type: 'section', label: 'SUMMARY' });
  for (const key of ['fx_effect_on_cash', 'net_change_in_cash', 'beginning_cash', 'ending_cash', 'free_cash_flow']) {
    if (CF[key] && typeof CF[key] === 'object') {
      rows.push({ key, label: labelFor(key), vals: CF[key] });
    }
  }
  return buildTable(periods, rows, data);
}

const RATIO_DEFINITIONS = {
  current_ratio: 'Current Assets ÷ Current Liabilities — measures short-term liquidity',
  quick_ratio: '(Current Assets − Inventory) ÷ Current Liabilities — liquidity excluding inventory',
  debt_to_equity: 'Total Liabilities ÷ Total Equity — overall leverage',
  net_debt_to_equity: '(Total Debt − Cash) ÷ Total Equity — net leverage',
  equity_ratio: 'Total Equity ÷ Total Assets — proportion funded by shareholders',
  gross_margin_pct: 'Gross Profit ÷ Revenue — profitability after direct costs',
  operating_margin_pct: 'Operating Income ÷ Revenue — profitability after all opex',
  net_margin_pct: 'Net Income ÷ Revenue — bottom-line profitability',
  roe: 'Net Income ÷ Total Equity — return on shareholders\' equity (quarterly, not annualized)',
  roa: 'Net Income ÷ Total Assets — return on total assets (quarterly, not annualized)',
  asset_turnover: 'Revenue ÷ Total Assets — asset efficiency (quarterly, not annualized)',
  interest_coverage: 'Operating Income ÷ Interest Expense — ability to service debt',
  fcf_margin_pct: 'Free Cash Flow ÷ Revenue — cash generation efficiency',
};

const RATIO_ORDER = [
  'gross_margin_pct', 'operating_margin_pct', 'net_margin_pct',
  'roe', 'roa', 'asset_turnover', 'interest_coverage', 'fcf_margin_pct',
  'current_ratio', 'quick_ratio', 'debt_to_equity', 'net_debt_to_equity', 'equity_ratio',
];

let ratioChart = null;
let ratioSelected = new Set(['gross_margin_pct', 'operating_margin_pct', 'net_margin_pct']);

const CHART_COLORS = [
  '#1f4e79','#c0392b','#27ae60','#8e44ad','#e67e22',
  '#2980b9','#d35400','#16a085','#7f8c8d','#f39c12',
  '#6c3483','#1abc9c','#e74c3c',
];

function renderRatioChart(ratios, periods) {
  const canvas = document.getElementById('ratioChart');
  if (!canvas) return;
  if (ratioChart) { ratioChart.destroy(); ratioChart = null; }
  const selected = [...ratioSelected];
  if (!selected.length) return;
  const datasets = selected.map((key, i) => ({
    label: labelFor(key),
    data: periods.map(p => ratios[p]?.[key] ?? null),
    borderColor: CHART_COLORS[i % CHART_COLORS.length],
    backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + '22',
    tension: 0.3,
    pointRadius: 3,
    spanGaps: true,
  }));
  const usePercent = selected.some(k => k.includes('pct') || k === 'roe' || k === 'roa' || k === 'equity_ratio' || k === 'asset_turnover');
  ratioChart = new Chart(canvas, {
    type: 'line',
    data: { labels: periods, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const key = selected[ctx.datasetIndex];
              const v = ctx.parsed.y;
              if (v === null) return `${ctx.dataset.label}: —`;
              if (key.includes('pct') || key === 'roe' || key === 'roa' || key === 'equity_ratio' || key === 'asset_turnover')
                return `${ctx.dataset.label}: ${(v * 100).toFixed(1)}%`;
              return `${ctx.dataset.label}: ${v.toFixed(2)}`;
            }
          }
        },
        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
      },
      scales: {
        x: { ticks: { font: { size: 10 }, maxRotation: 45 } },
        y: {
          ticks: {
            font: { size: 10 },
            callback: (v) => usePercent ? (v * 100).toFixed(0) + '%' : v.toFixed(2),
          }
        }
      }
    }
  });
}

function renderRatios(data) {
  const ratios = data.financial_ratios;
  if (!ratios || !Object.keys(ratios).length) return '<div class="empty">No financial ratios computed for this ticker.</div>';
  const periods = sortPeriods(Object.keys(ratios));
  const metricKeys = new Set();
  for (const p of periods) for (const k of Object.keys(ratios[p])) metricKeys.add(k);
  // Order metrics: RATIO_ORDER first, then any extras
  const ordered = RATIO_ORDER.filter(k => metricKeys.has(k));
  for (const k of metricKeys) if (!ordered.includes(k)) ordered.push(k);

  // Chart area
  let html = '<div class="ratio-chart-wrapper">';
  html += '<div class="ratio-chart-controls">';
  for (const key of ordered) {
    const active = ratioSelected.has(key) ? ' active' : '';
    html += `<span class="ratio-chip${active}" data-metric="${key}">${labelFor(key)}</span>`;
  }
  html += '</div>';
  html += '<div style="position:relative;height:320px"><canvas id="ratioChart"></canvas></div>';
  html += '</div>';

  // Table with tooltip
  const rows = ordered.map(key => ({ key, label: labelFor(key), vals: Object.fromEntries(periods.map(p => [p, ratios[p]?.[key] ?? null])) }));
  // Custom table with tooltip in metric name
  html += '<div class="table-wrapper"><table><thead><tr>';
  html += '<th class="metric-col">Metric</th>';
  for (const p of periods) {
    const end = getPeriodEnd(data, p);
    html += `<th>${p}${end ? `<span class="period-end">${end}</span>` : ''}</th>`;
  }
  html += '</tr></thead><tbody>';
  for (const row of rows) {
    const def = RATIO_DEFINITIONS[row.key] || '';
    const isTotal = TOTAL_KEYS.has(row.key);
    html += `<tr class="${isTotal ? 'total-row' : ''}">`;
    html += `<td class="metric-name ratio-metric-name">${row.label}${def ? `<span class="ratio-tip">${def}</span>` : ''}</td>`;
    for (const p of periods) {
      const v = row.vals?.[p];
      const f = fmtVal(v, row.key);
      html += `<td class="val ${f.cls}">${f.text}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  // After DOM update, init chart & chip listeners
  setTimeout(() => {
    renderRatioChart(ratios, periods);
    document.querySelectorAll('.ratio-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const m = chip.dataset.metric;
        if (ratioSelected.has(m)) ratioSelected.delete(m); else ratioSelected.add(m);
        chip.classList.toggle('active');
        renderRatioChart(ratios, periods);
      });
    });
  }, 0);

  return html;
}

function renderTagAudit(data) {
  const audit = data.classification_audit || data.tag_history || {};
  if (!Object.keys(audit).length) return '<div class="empty">No tag classification audit data available.</div>';

  // Determine which format: classification_audit (new) or tag_history (legacy)
  const isNew = !!data.classification_audit;

  let html = '<div class="audit-legend">';
  html += '<div class="audit-legend-item"><span class="audit-badge badge-known">K</span> Known candidate</div>';
  html += '<div class="audit-legend-item"><span class="audit-badge badge-label">L</span> Label discovery</div>';
  html += '<div class="audit-legend-item"><span class="audit-badge badge-llm">AI</span> LLM inference</div>';
  html += '</div>';

  // Group by statement type
  const IS_METRICS = new Set(['revenue','cost_of_goods_sold','gross_profit','research_and_development',
    'selling_general_administrative','restructuring_charges','operating_income','interest_expense',
    'interest_income','other_nonoperating_income_expense','income_before_taxes','income_tax_expense',
    'equity_method_investments','net_income','eps_basic','eps_diluted','shares_basic','shares_diluted']);
  const BS_METRICS = new Set(['cash_and_cash_equivalents','short_term_investments','accounts_receivable',
    'inventories','other_current_assets','total_current_assets','property_plant_equipment_net',
    'operating_lease_rou_asset','goodwill','intangible_assets','deferred_tax_assets',
    'other_noncurrent_assets','total_assets','accounts_payable','accrued_liabilities','current_debt',
    'other_current_liabilities','total_current_liabilities','long_term_debt',
    'operating_lease_noncurrent','other_noncurrent_liabilities','total_liabilities',
    'common_stock','additional_paid_in_capital','retained_earnings','treasury_stock','aoci',
    'total_equity','total_liabilities_and_equity']);

  const groups = { 'Income Statement': [], 'Balance Sheet': [], 'Cash Flow': [] };
  for (const [metric, info] of Object.entries(audit)) {
    const bucket = IS_METRICS.has(metric) ? 'Income Statement' : BS_METRICS.has(metric) ? 'Balance Sheet' : 'Cash Flow';
    groups[bucket].push({ metric, info });
  }

  for (const [section, items] of Object.entries(groups)) {
    if (!items.length) continue;
    html += `<div class="audit-section-title">${section}</div>`;

    for (const { metric, info } of items) {
      // Handle both new (classification_audit) and legacy (tag_history) formats
      const tags = isNew ? (info.tags || []) : (info.tags_used || []).map(tag => ({
        tag,
        label: tag,
        method: 'known',
        confidence: 1.0,
        periods: Object.entries(info.tag_by_period || {}).filter(([,t]) => t === tag).map(([p]) => p),
      }));

      const isMulti = tags.length > 1;
      const hasLLM = tags.some(t => t.method === 'llm_inference');
      html += `<div class="audit-card ${isMulti ? 'multi-tag' : ''} ${hasLLM ? 'llm-inferred' : ''}">`;
      html += `<div class="audit-metric">${labelFor(metric)} <span style="font-weight:400;color:var(--muted)">(${metric})</span></div>`;

      for (const t of tags) {
        const badgeCls = t.method === 'llm_inference' ? 'badge-llm' : t.method === 'label_discovery' ? 'badge-label' : 'badge-known';
        const badgeText = t.method === 'llm_inference' ? 'AI' : t.method === 'label_discovery' ? 'L' : 'K';
        const periods = sortPeriods(t.periods || []);
        const periodRange = periods.length > 0 ? `${periods[0]} → ${periods[periods.length-1]}` : '';

        html += '<div class="audit-tag">';
        html += `<span class="audit-badge ${badgeCls}">${badgeText}</span>`;
        html += '<div>';
        html += `<div class="audit-label">${t.label || t.tag}</div>`;
        html += `<div class="audit-tag-name">${t.tag}</div>`;
        if (periodRange) html += `<div class="audit-periods">${periods.length} periods: ${periodRange}</div>`;
        if (t.confidence < 1.0) html += `<div class="audit-confidence">Confidence: ${(t.confidence * 100).toFixed(0)}%</div>`;
        if (t.reasoning) html += `<div class="audit-reasoning">"${t.reasoning}"</div>`;
        html += '</div></div>';
      }
      html += '</div>';
    }
  }

  return html;
}

// ── Annual aggregation ──
const SUM_EXCLUDE = new Set(['eps_basic', 'eps_diluted', 'shares_basic', 'shares_diluted',
  'shares_basic_millions', 'shares_diluted_millions']);
const AVG_KEYS = new Set(['shares_basic', 'shares_diluted', 'shares_basic_millions', 'shares_diluted_millions']);

function groupByFY(periods) {
  const map = {};
  for (const p of periods) {
    const m = p.match(/Q(\d+)_FY(\d+)/);
    if (!m) continue;
    const fy = `FY${m[2]}`;
    if (!map[fy]) map[fy] = [];
    map[fy].push(p);
  }
  return map;
}

function aggVals(valObj, fyMap, mode) {
  // mode: 'sum', 'avg', 'last' (Q4 snapshot)
  const result = {};
  for (const [fy, quarters] of Object.entries(fyMap)) {
    const vals = quarters.map(q => valObj[q]).filter(v => v !== null && v !== undefined);
    if (!vals.length) continue;
    if (mode === 'sum') result[fy] = Math.round(vals.reduce((a, b) => a + b, 0) * 100) / 100;
    else if (mode === 'avg') result[fy] = Math.round((vals.reduce((a, b) => a + b, 0) / vals.length) * 100) / 100;
    else { // last — use Q4 value
      const q4 = quarters.find(q => q.startsWith('Q4'));
      if (q4 && valObj[q4] !== null && valObj[q4] !== undefined) result[fy] = valObj[q4];
    }
  }
  return result;
}

function toAnnualData(data) {
  const isFyMap = groupByFY(data.metadata.periods_income_statement || []);
  const bsFyMap = groupByFY(data.metadata.periods_balance_sheet || []);
  const fys = [...new Set([...Object.keys(isFyMap), ...Object.keys(bsFyMap)])].sort();

  // IS: sum (except EPS → derive, shares → avg)
  const annIS = {};
  const srcIS = data.income_statement || {};
  for (const [key, vals] of Object.entries(srcIS)) {
    if (SUM_EXCLUDE.has(key)) {
      if (AVG_KEYS.has(key)) annIS[key] = aggVals(vals, isFyMap, 'avg');
    } else {
      annIS[key] = aggVals(vals, isFyMap, 'sum');
    }
  }
  // Derive EPS from annual net_income / shares
  for (const epsKey of ['eps_basic', 'eps_diluted']) {
    const sharesKey = epsKey === 'eps_basic' ? 'shares_basic' : 'shares_diluted';
    const altSharesKey = sharesKey + '_millions';
    const ni = annIS.net_income || {};
    const sh = annIS[sharesKey] || annIS[altSharesKey] || {};
    if (Object.keys(ni).length && Object.keys(sh).length) {
      annIS[epsKey] = {};
      for (const fy of fys) {
        if (ni[fy] !== undefined && sh[fy] && sh[fy] !== 0) {
          annIS[epsKey][fy] = Math.round((ni[fy] / sh[fy]) * 100) / 100;
        }
      }
    }
  }

  // BS: Q4 snapshot
  const annBS = { assets: {}, liabilities: {}, equity: {} };
  const srcBS = data.balance_sheet || {};
  for (const sec of ['assets', 'liabilities', 'equity']) {
    if (!srcBS[sec]) continue;
    for (const [key, vals] of Object.entries(srcBS[sec])) {
      annBS[sec][key] = aggVals(vals, bsFyMap, 'last');
    }
  }

  // CF: sum
  const annCF = {};
  const srcCF = data.cash_flow_statement || {};
  for (const secKey of ['operating_activities', 'investing_activities', 'financing_activities']) {
    if (!srcCF[secKey]) continue;
    annCF[secKey] = {};
    for (const [key, vals] of Object.entries(srcCF[secKey])) {
      if (typeof vals === 'object' && vals !== null && !Array.isArray(vals)) {
        annCF[secKey][key] = aggVals(vals, isFyMap, 'sum');
      }
    }
  }
  // CF summary items
  for (const key of ['fx_effect_on_cash', 'net_change_in_cash', 'free_cash_flow']) {
    if (srcCF[key] && typeof srcCF[key] === 'object') {
      annCF[key] = aggVals(srcCF[key], isFyMap, 'sum');
    }
  }
  // beginning_cash = Q1 value, ending_cash = Q4 value
  for (const key of ['beginning_cash', 'ending_cash']) {
    if (srcCF[key] && typeof srcCF[key] === 'object') {
      annCF[key] = aggVals(srcCF[key], isFyMap, key === 'ending_cash' ? 'last' : 'sum');
    }
  }
  // For beginning_cash, pick Q1 of each FY
  if (srcCF.beginning_cash) {
    const bc = {};
    for (const [fy, quarters] of Object.entries(isFyMap)) {
      const q1 = quarters.find(q => q.startsWith('Q1'));
      if (q1 && srcCF.beginning_cash[q1] !== undefined) bc[fy] = srcCF.beginning_cash[q1];
    }
    annCF.beginning_cash = bc;
  }

  // Ratios: recompute from annual IS + Q4 BS
  const annRatios = {};
  for (const fy of fys) {
    const r = {};
    const ca = annBS.assets?.total_current_assets?.[fy];
    const cl = annBS.liabilities?.total_current_liabilities?.[fy];
    const inv = annBS.assets?.inventories?.[fy];
    const cash = annBS.assets?.cash_and_cash_equivalents?.[fy];
    const ta = annBS.assets?.total_assets?.[fy];
    const tl = annBS.liabilities?.total_liabilities?.[fy];
    const te = annBS.equity?.total_equity?.[fy];
    const ltd = annBS.liabilities?.long_term_debt?.[fy] || 0;
    const cd = annBS.liabilities?.current_debt?.[fy] || 0;
    const totalDebt = ltd + cd;
    const rev = annIS.revenue?.[fy];
    const gp = annIS.gross_profit?.[fy];
    const oi = annIS.operating_income?.[fy];
    const ni = annIS.net_income?.[fy];
    const intExp = annIS.interest_expense?.[fy];
    const ocf = annCF.operating_activities?.net_cash_from_operating?.[fy];
    const capex = annCF.investing_activities?.capital_expenditures?.[fy];
    const fcfVal = (ocf != null && capex != null) ? ocf - capex : annCF.free_cash_flow?.[fy];

    if (ca && cl && cl !== 0) r.current_ratio = Math.round(ca / cl * 100) / 100;
    if (ca != null && inv != null && cl && cl !== 0) r.quick_ratio = Math.round((ca - (inv || 0)) / cl * 100) / 100;
    if (tl != null && te && te !== 0) r.debt_to_equity = Math.round(tl / te * 100) / 100;
    if (totalDebt && te && te !== 0) r.net_debt_to_equity = Math.round((totalDebt - (cash || 0)) / te * 100) / 100;
    if (ta && ta !== 0 && te != null) r.equity_ratio = Math.round(te / ta * 10000) / 10000;
    if (gp != null && rev && rev !== 0) r.gross_margin_pct = Math.round(gp / rev * 10000) / 10000;
    if (oi != null && rev && rev !== 0) r.operating_margin_pct = Math.round(oi / rev * 10000) / 10000;
    if (ni != null && rev && rev !== 0) r.net_margin_pct = Math.round(ni / rev * 10000) / 10000;
    if (ni != null && te && te !== 0) r.roe = Math.round(ni / te * 10000) / 10000;
    if (ni != null && ta && ta !== 0) r.roa = Math.round(ni / ta * 10000) / 10000;
    if (rev != null && ta && ta !== 0) r.asset_turnover = Math.round(rev / ta * 10000) / 10000;
    if (oi != null && intExp && intExp !== 0) r.interest_coverage = Math.round(oi / intExp * 100) / 100;
    if (fcfVal != null && rev && rev !== 0) r.fcf_margin_pct = Math.round(fcfVal / rev * 10000) / 10000;

    if (Object.keys(r).length) annRatios[fy] = r;
  }

  // Filings: map FY → Q4 filing
  const annFilings = {};
  for (const [fy, quarters] of Object.entries(bsFyMap)) {
    const q4 = quarters.find(q => q.startsWith('Q4'));
    if (q4 && data.filings?.[q4]) annFilings[fy] = data.filings[q4];
  }

  return {
    metadata: {
      ...data.metadata,
      periods_income_statement: fys,
      periods_balance_sheet: fys,
    },
    filings: annFilings,
    income_statement: annIS,
    balance_sheet: annBS,
    cash_flow_statement: annCF,
    financial_ratios: annRatios,
    classification_audit: data.classification_audit,
  };
}

// ── App state ──
let currentData = null;
let currentTab = 'is';
let viewMode = 'quarterly';

const TAB_CONFIG = [
  { id: 'is', label: 'Income Statement', render: renderIncomeStatement },
  { id: 'bs', label: 'Balance Sheet', render: renderBalanceSheet },
  { id: 'cf', label: 'Cash Flow', render: renderCashFlow },
  { id: 'ratios', label: 'Financial Ratios', render: renderRatios },
  { id: 'audit', label: 'Tag Audit', render: renderTagAudit },
];

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = TAB_CONFIG.map(t =>
    `<div class="tab ${t.id === currentTab ? 'active' : ''}" data-tab="${t.id}">${t.label}</div>`
  ).join('');
  tabsEl.querySelectorAll('.tab').forEach(el => {
    el.addEventListener('click', () => {
      currentTab = el.dataset.tab;
      renderTabs();
      renderContent();
    });
  });
}

function getDisplayData() {
  if (!currentData) return null;
  return viewMode === 'annual' ? toAnnualData(currentData) : currentData;
}

function renderContent() {
  const content = document.getElementById('content');
  const displayData = getDisplayData();
  if (!displayData) {
    content.innerHTML = '<div class="loading">Select a ticker to view financial statements.</div>';
    return;
  }
  const cfg = TAB_CONFIG.find(t => t.id === currentTab);
  content.innerHTML = cfg.render(displayData);
}

function updateMeta(data) {
  const m = data.metadata;
  const el = document.getElementById('meta-info');
  el.textContent = `${m.company} | ${m.exchange} | FY End: ${m.fiscal_year_end} | Updated: ${m.last_updated}`;
}

async function loadTicker(ticker) {
  if (!ticker) { currentData = null; renderContent(); return; }
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const resp = await fetch(`financials/${ticker}/${ticker}_financials.json`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    currentData = await resp.json();
    updateMeta(currentData);
    renderContent();
  } catch (e) {
    content.innerHTML = `<div class="loading">Failed to load ${ticker}: ${e.message}</div>`;
  }
}

async function init() {
  renderTabs();
  const select = document.getElementById('ticker-select');
  try {
    const resp = await fetch('tickers.json');
    const tickers = await resp.json();
    for (const t of tickers) {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      select.appendChild(opt);
    }
  } catch {
    for (const t of ['SNDK', 'MU', 'LEU']) {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      select.appendChild(opt);
    }
  }
  select.addEventListener('change', () => loadTicker(select.value));

  // View mode toggle
  document.querySelectorAll('#view-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      viewMode = btn.dataset.mode;
      document.querySelectorAll('#view-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderContent();
    });
  });
}

init();
</script>
