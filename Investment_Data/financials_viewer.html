<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financials Viewer</title>
<style>
:root {
  --bg: #f7f8fa;
  --card: #fff;
  --border: #e2e5ea;
  --header-bg: #1f4e79;
  --header-fg: #fff;
  --section-bg: #d6e4f0;
  --section-fg: #1f4e79;
  --total-bg: #fff8e1;
  --total-fg: #7b3f00;
  --alt-row: #f2f8fd;
  --positive: #1b7a3d;
  --negative: #c0392b;
  --derived-bg: #e2efda;
  --tab-active: #1f4e79;
  --tab-hover: #2a6da8;
  --text: #2c3e50;
  --muted: #7f8c8d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }

.topbar {
  background: var(--header-bg);
  color: var(--header-fg);
  padding: 12px 24px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.topbar h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
.topbar select {
  padding: 6px 12px; border-radius: 4px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
  background: rgba(255,255,255,0.15); color: #fff;
}
.topbar select option { color: #333; background: #fff; }
.topbar .meta { font-size: 12px; color: rgba(255,255,255,0.7); margin-left: auto; }

.tabs {
  display: flex; gap: 0; background: #fff;
  border-bottom: 2px solid var(--border);
  padding: 0 24px;
  position: sticky; top: 48px; z-index: 99;
}
.tab {
  padding: 10px 20px; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all 0.15s;
  user-select: none;
}
.tab:hover { color: var(--tab-hover); }
.tab.active { color: var(--tab-active); border-bottom-color: var(--tab-active); font-weight: 700; }

.container { padding: 16px 24px; max-width: 100%; overflow-x: auto; }

.table-wrapper { overflow-x: auto; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

table {
  width: 100%; border-collapse: collapse;
  background: var(--card); font-size: 12px;
}
th, td {
  padding: 6px 12px; border: 1px solid var(--border);
  white-space: nowrap;
}
th {
  background: var(--header-bg); color: var(--header-fg);
  font-weight: 600; text-align: center;
  position: sticky; top: 0; z-index: 10;
}
th.metric-col {
  text-align: left; min-width: 260px;
  position: sticky; left: 0; z-index: 11;
}
td.metric-name {
  text-align: left; font-weight: 500;
  position: sticky; left: 0; z-index: 5;
  background: inherit;
}
td.val { text-align: right; font-variant-numeric: tabular-nums; }
td.val.negative { color: var(--negative); }
td.val.positive-highlight { color: var(--positive); }
td.val.null-val { color: var(--muted); text-align: center; }

tr.section-row td {
  background: var(--section-bg); color: var(--section-fg);
  font-weight: 700; font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.5px;
}
tr.total-row td { background: var(--total-bg); font-weight: 700; color: var(--total-fg); }
tr.total-row td.metric-name { font-weight: 700; }
tr:nth-child(even):not(.section-row):not(.total-row) td { background: var(--alt-row); }
tr:nth-child(even):not(.section-row):not(.total-row) td.metric-name { background: var(--alt-row); }
tr:nth-child(odd):not(.section-row):not(.total-row) td { background: var(--card); }
tr:nth-child(odd):not(.section-row):not(.total-row) td.metric-name { background: var(--card); }

.loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
.empty { text-align: center; padding: 40px; color: var(--muted); }
.period-end { display: block; font-size: 10px; font-weight: 400; color: rgba(255,255,255,0.7); }

@media (max-width: 768px) {
  .topbar { padding: 8px 12px; }
  .tabs { padding: 0 12px; }
  .container { padding: 8px 12px; }
  th, td { padding: 4px 6px; font-size: 11px; }
  th.metric-col { min-width: 180px; }
}
</style>
</head>
<body>

<div class="topbar">
  <h1>Financials Viewer</h1>
  <select id="ticker-select"><option value="">-- Select Ticker --</option></select>
  <div class="meta" id="meta-info"></div>
</div>

<div class="tabs" id="tabs"></div>

<div class="container" id="content">
  <div class="loading">Select a ticker to view financial statements.</div>
</div>

<script>
const PERIOD_ORDER_WEIGHT = (p) => {
  const m = p.match(/Q(\d+)_FY(\d+)/);
  if (!m) {
    if (p.includes('START')) return -1;
    return 0;
  }
  return parseInt(m[2]) * 10 + parseInt(m[1]);
};

const sortPeriods = (periods) => [...periods].sort((a, b) => PERIOD_ORDER_WEIGHT(a) - PERIOD_ORDER_WEIGHT(b));

const LABEL_MAP = {
  revenue: 'Revenue',
  cost_of_goods_sold: 'Cost of Goods Sold',
  cost_of_goods_and_services_sold: 'Cost of Goods Sold',
  gross_profit: 'Gross Profit',
  gross_margin: 'Gross Margin',
  gross_margin_pct: '  Gross Margin %',
  research_and_development: 'R&D Expense',
  selling_general_administrative: 'SG&A Expense',
  selling_general_and_administrative: 'SG&A Expense',
  restructuring_charges: 'Restructuring Charges',
  advanced_technology_costs: 'Advanced Technology Costs',
  equity_related_compensation: 'Equity-related Compensation',
  amortization_of_intangible_assets: 'Amortization of Intangibles',
  other_operating_income_expense_net: 'Other Operating Income/Exp',
  operating_income: 'Operating Income (Loss)',
  operating_margin_pct: '  Operating Margin %',
  interest_expense: 'Interest Expense',
  interest_income: 'Interest Income',
  interest_income_net: 'Interest Income (net)',
  investment_income: 'Investment Income',
  other_nonoperating_income_expense: 'Other Non-op Income/Exp',
  nonoperating_income_expense_total: 'Non-op Income/Exp Total',
  income_before_taxes: 'Income Before Taxes',
  income_tax_expense: 'Income Tax Expense',
  income_tax_provision: 'Income Tax Provision',
  effective_tax_rate: '  Effective Tax Rate',
  equity_method_investments: 'Equity Method Investments',
  equity_in_net_income_of_investees: 'Equity in Investees',
  net_income: 'Net Income (Loss)',
  net_margin_pct: '  Net Margin %',
  eps_basic: 'EPS — Basic',
  eps_diluted: 'EPS — Diluted',
  shares_basic_millions: 'Shares Basic (M)',
  shares_diluted_millions: 'Shares Diluted (M)',
  // Balance Sheet
  cash_and_cash_equivalents: 'Cash & Cash Equivalents',
  short_term_investments: 'Short-term Investments',
  accounts_receivable: 'Accounts Receivable',
  receivables: 'Receivables',
  inventories: 'Inventories',
  other_current_assets: 'Other Current Assets',
  total_current_assets: 'Total Current Assets',
  property_plant_equipment_net: 'PP&E (net)',
  operating_lease_rou_asset: 'Operating Lease ROU',
  operating_lease_right_of_use: 'Operating Lease ROU',
  long_term_marketable_investments: 'LT Marketable Investments',
  goodwill: 'Goodwill',
  intangible_assets: 'Intangible Assets',
  deferred_tax_assets: 'Deferred Tax Assets',
  deferred_tax_assets_net: 'Deferred Tax Assets (net)',
  other_noncurrent_assets: 'Other Noncurrent Assets',
  total_assets: 'Total Assets',
  accounts_payable_and_accrued_expenses: 'AP & Accrued Expenses',
  accrued_liabilities_current: 'Accrued Liabilities',
  employee_related_liabilities_current: 'Employee Liabilities',
  current_debt: 'Current Debt',
  operating_lease_liability_current: 'Operating Lease (Current)',
  other_current_liabilities: 'Other Current Liabilities',
  total_current_liabilities: 'Total Current Liabilities',
  long_term_debt: 'Long-term Debt',
  long_term_debt_noncurrent: 'Long-term Debt',
  noncurrent_operating_lease_liabilities: 'Operating Lease (NC)',
  operating_lease_liability_noncurrent: 'Operating Lease (NC)',
  noncurrent_unearned_gov_incentives: 'Unearned Gov Incentives',
  other_noncurrent_liabilities: 'Other Noncurrent Liabilities',
  total_liabilities: 'Total Liabilities',
  common_stock: 'Common Stock',
  additional_capital: 'Additional Paid-in Capital',
  additional_paid_in_capital: 'Additional Paid-in Capital',
  retained_earnings: 'Retained Earnings (Deficit)',
  retained_earnings_accumulated_deficit: 'Retained Earnings (Deficit)',
  treasury_stock: 'Treasury Stock',
  aoci: 'AOCI',
  accumulated_other_comprehensive_income_loss: 'AOCI',
  total_equity: 'Total Equity',
  total_liabilities_and_equity: 'Total Liabilities & Equity',
  // Cash Flow
  net_cash_from_operating: 'Net Cash from Operating',
  net_cash_from_operating_activities: 'Net Cash from Operating',
  depreciation_and_amortization: 'Depreciation & Amortization',
  share_based_compensation: 'Share-based Compensation',
  stock_based_compensation: 'Share-based Compensation',
  deferred_income_tax: 'Deferred Income Tax',
  goodwill_impairment: 'Goodwill Impairment',
  other_asset_impairment: 'Other Asset Impairment',
  gain_loss_on_sale_of_business: 'Gain/Loss on Sale of Business',
  change_in_receivables: 'Change in Receivables',
  change_in_inventories: 'Change in Inventories',
  change_in_accounts_payable: 'Change in AP',
  change_in_accounts_payable_accrued: 'Change in AP & Accrued',
  change_in_accrued_liabilities: 'Change in Accrued Liabilities',
  change_in_employee_liabilities: 'Change in Employee Liabilities',
  change_in_other_current_liabilities: 'Change in Other CL',
  change_in_other_noncurrent_liabilities: 'Change in Other NCL',
  other_operating: 'Other Operating',
  other: 'Other',
  capital_expenditures: 'Capital Expenditures',
  proceeds_from_sale_of_business: 'Proceeds from Sale of Business',
  proceeds_from_sale_of_ppe: 'Proceeds from Sale of PP&E',
  purchases_of_afs_securities: 'Purchases of AFS Securities',
  proceeds_from_government_incentives: 'Gov Incentive Proceeds',
  proceeds_from_maturities_sales_of_afs: 'Proceeds from AFS',
  net_cash_from_investing: 'Net Cash from Investing',
  net_cash_used_for_investing_activities: 'Net Cash from Investing',
  proceeds_from_debt: 'Proceeds from Debt',
  repayments_of_debt: 'Repayments of Debt',
  repayments_stock_withholdings: 'Stock Withholdings',
  repurchases_stock_program: 'Stock Repurchases',
  proceeds_from_equity: 'Proceeds from Equity',
  tax_withholding_payments: 'Tax Withholding Payments',
  dividends_paid: 'Dividends Paid',
  net_cash_from_financing: 'Net Cash from Financing',
  net_cash_used_for_financing_activities: 'Net Cash from Financing',
  net_cash_from_financing_activities: 'Net Cash from Financing',
  fx_effect_on_cash: 'FX Effect on Cash',
  net_change_in_cash: 'Net Change in Cash',
  beginning_cash: 'Beginning Cash',
  ending_cash: 'Ending Cash',
  free_cash_flow: 'Free Cash Flow',
  // Ratios
  current_ratio: 'Current Ratio',
  quick_ratio: 'Quick Ratio',
  debt_to_equity: 'Debt-to-Equity',
  net_debt_to_equity: 'Net Debt-to-Equity',
  equity_ratio: 'Equity Ratio',
};

const TOTAL_KEYS = new Set([
  'revenue', 'gross_profit', 'gross_margin', 'operating_income', 'income_before_taxes',
  'net_income', 'total_current_assets', 'total_assets', 'total_current_liabilities',
  'total_liabilities', 'total_equity', 'total_liabilities_and_equity',
  'net_cash_from_operating', 'net_cash_from_operating_activities',
  'net_cash_from_investing', 'net_cash_used_for_investing_activities',
  'net_cash_from_financing', 'net_cash_used_for_financing_activities',
  'net_cash_from_financing_activities',
  'free_cash_flow', 'ending_cash', 'current_ratio',
  'eps_diluted',
]);

const isPct = (key) => key.includes('pct') || key.includes('rate') || key === 'equity_ratio';
const isEps = (key) => key.startsWith('eps');

function fmtVal(val, key) {
  if (val === null || val === undefined) return { text: '—', cls: 'null-val' };
  if (isPct(key)) return { text: (val * 100).toFixed(1) + '%', cls: val < 0 ? 'negative' : '' };
  if (isEps(key)) return { text: '$' + val.toFixed(2), cls: val < 0 ? 'negative' : '' };
  if (key.includes('ratio') || key === 'debt_to_equity' || key === 'net_debt_to_equity')
    return { text: val.toFixed(2), cls: '' };
  const neg = val < 0;
  const abs = Math.abs(val);
  const text = abs >= 1 ? abs.toLocaleString('en-US', { maximumFractionDigits: 1 }) : abs.toFixed(2);
  return { text: neg ? `(${text})` : text, cls: neg ? 'negative' : '' };
}

function labelFor(key) {
  return LABEL_MAP[key] || key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function getPeriodEnd(data, period) {
  const f = data.filings?.[period];
  if (f?.period_end) return f.period_end;
  return '';
}

// ── Render helpers ──

function buildTable(periods, rows, data) {
  if (!rows.length) return '<div class="empty">No data available for this section.</div>';
  let html = '<div class="table-wrapper"><table><thead><tr>';
  html += '<th class="metric-col">Metric</th>';
  for (const p of periods) {
    const end = getPeriodEnd(data, p);
    html += `<th>${p}${end ? `<span class="period-end">${end}</span>` : ''}</th>`;
  }
  html += '</tr></thead><tbody>';
  for (const row of rows) {
    if (row.type === 'section') {
      html += `<tr class="section-row"><td colspan="${periods.length + 1}">${row.label}</td></tr>`;
      continue;
    }
    const isTotal = TOTAL_KEYS.has(row.key);
    html += `<tr class="${isTotal ? 'total-row' : ''}">`;
    html += `<td class="metric-name">${row.label}</td>`;
    for (const p of periods) {
      const v = row.vals?.[p];
      const f = fmtVal(v, row.key);
      html += `<td class="val ${f.cls}">${f.text}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  return html;
}

// ── Tab renderers ──

function renderIncomeStatement(data) {
  const periods = sortPeriods(data.metadata.periods_income_statement || data.metadata.periods || []);
  const IS = data.income_statement || {};
  const rows = Object.keys(IS).map(key => ({ key, label: labelFor(key), vals: IS[key] }));
  return buildTable(periods, rows, data);
}

function renderBalanceSheet(data) {
  const periods = sortPeriods(data.metadata.periods_balance_sheet || data.metadata.periods || []);
  const BS = data.balance_sheet || {};
  const rows = [];
  for (const [secKey, secLabel] of [['assets', 'ASSETS'], ['liabilities', 'LIABILITIES'], ['equity', 'EQUITY']]) {
    const sec = BS[secKey];
    if (!sec) continue;
    rows.push({ type: 'section', label: secLabel });
    for (const key of Object.keys(sec)) {
      rows.push({ key, label: labelFor(key), vals: sec[key] });
    }
  }
  return buildTable(periods, rows, data);
}

function renderCashFlow(data) {
  const periods = sortPeriods(data.metadata.periods_income_statement || data.metadata.periods || []);
  const CF = data.cash_flow_statement || {};
  const rows = [];
  for (const [secKey, secLabel] of [
    ['operating_activities', 'OPERATING ACTIVITIES'],
    ['investing_activities', 'INVESTING ACTIVITIES'],
    ['financing_activities', 'FINANCING ACTIVITIES'],
  ]) {
    const sec = CF[secKey];
    if (!sec) continue;
    rows.push({ type: 'section', label: secLabel });
    for (const key of Object.keys(sec)) {
      if (typeof sec[key] === 'object' && sec[key] !== null && !Array.isArray(sec[key])) {
        rows.push({ key, label: labelFor(key), vals: sec[key] });
      }
    }
  }
  rows.push({ type: 'section', label: 'SUMMARY' });
  for (const key of ['fx_effect_on_cash', 'net_change_in_cash', 'beginning_cash', 'ending_cash', 'free_cash_flow']) {
    if (CF[key] && typeof CF[key] === 'object') {
      rows.push({ key, label: labelFor(key), vals: CF[key] });
    }
  }
  return buildTable(periods, rows, data);
}

function renderRatios(data) {
  const ratios = data.financial_ratios;
  if (!ratios || !Object.keys(ratios).length) return '<div class="empty">No financial ratios computed for this ticker.</div>';
  const periods = sortPeriods(Object.keys(ratios));
  const metricKeys = new Set();
  for (const p of periods) for (const k of Object.keys(ratios[p])) metricKeys.add(k);
  const rows = [...metricKeys].map(key => ({
    key,
    label: labelFor(key),
    vals: Object.fromEntries(periods.map(p => [p, ratios[p]?.[key] ?? null])),
  }));
  return buildTable(periods, rows, data);
}

// ── App state ──
let currentData = null;
let currentTab = 'is';

const TAB_CONFIG = [
  { id: 'is', label: 'Income Statement', render: renderIncomeStatement },
  { id: 'bs', label: 'Balance Sheet', render: renderBalanceSheet },
  { id: 'cf', label: 'Cash Flow', render: renderCashFlow },
  { id: 'ratios', label: 'Financial Ratios', render: renderRatios },
];

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = TAB_CONFIG.map(t =>
    `<div class="tab ${t.id === currentTab ? 'active' : ''}" data-tab="${t.id}">${t.label}</div>`
  ).join('');
  tabsEl.querySelectorAll('.tab').forEach(el => {
    el.addEventListener('click', () => {
      currentTab = el.dataset.tab;
      renderTabs();
      renderContent();
    });
  });
}

function renderContent() {
  const content = document.getElementById('content');
  if (!currentData) {
    content.innerHTML = '<div class="loading">Select a ticker to view financial statements.</div>';
    return;
  }
  const cfg = TAB_CONFIG.find(t => t.id === currentTab);
  content.innerHTML = cfg.render(currentData);
}

function updateMeta(data) {
  const m = data.metadata;
  const el = document.getElementById('meta-info');
  el.textContent = `${m.company} | ${m.exchange} | FY End: ${m.fiscal_year_end} | Updated: ${m.last_updated}`;
}

async function loadTicker(ticker) {
  if (!ticker) { currentData = null; renderContent(); return; }
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const resp = await fetch(`financials/${ticker}/${ticker}_financials.json`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    currentData = await resp.json();
    updateMeta(currentData);
    renderContent();
  } catch (e) {
    content.innerHTML = `<div class="loading">Failed to load ${ticker}: ${e.message}</div>`;
  }
}

async function init() {
  renderTabs();
  const select = document.getElementById('ticker-select');
  try {
    const resp = await fetch('tickers.json');
    const tickers = await resp.json();
    for (const t of tickers) {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      select.appendChild(opt);
    }
  } catch {
    for (const t of ['SNDK', 'MU', 'LEU']) {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      select.appendChild(opt);
    }
  }
  select.addEventListener('change', () => loadTicker(select.value));
}

init();
</script>
</body>
</html>
