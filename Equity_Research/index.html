<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equity Research</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Helvetica Neue", Arial, "PingFang TC", "Noto Sans TC", sans-serif;
      background: #F8F4F4;
      color: #2C1517;
      line-height: 1.6;
    }
    .page-wrapper { max-width: 720px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }

    header { margin-bottom: 2.5rem; }
    header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: 0.02em; }
    header h1 span { color: #C02734; }
    .subtitle { font-size: 0.85rem; color: #8B7E80; margin-top: 0.35rem; }

    .market-group { margin-bottom: 2rem; }
    .market-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #8B7E80;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }
    .ticker-grid { display: grid; gap: 0.75rem; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    .ticker-card {
      background: #FFFFFF;
      border: 1px solid #E0D8D8;
      border-radius: 8px;
      padding: 1.25rem;
      box-shadow: 0 1px 4px rgba(44,21,23,0.06);
      text-decoration: none;
      color: #2C1517;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .ticker-card:hover {
      border-color: #C02734;
      box-shadow: 0 2px 8px rgba(192,39,52,0.12);
    }
    .ticker-symbol { font-size: 1.3rem; font-weight: 700; color: #C02734; }
    .ticker-name { font-size: 0.82rem; color: #6B5E60; margin-top: 0.2rem; }
    .ticker-tags { margin-top: 0.5rem; }
    .tag {
      display: inline-block;
      font-size: 0.68rem;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      background: #F0EAEA;
      color: #8B7E80;
      margin-right: 0.3rem;
    }
    .tag.ready { background: #D4EDDA; color: #155724; }
    .tag.wip { background: #FFF3CD; color: #856404; }

    footer { border-top: 1px solid #E0D8D8; padding-top: 1rem; font-size: 0.75rem; color: #B0A0A2; }
  </style>
</head>
<body>
<div class="page-wrapper">

  <a href="../Portal/" style="display:inline-block;margin-bottom:0.75rem;color:#C02734;text-decoration:none;font-size:0.85rem;font-weight:600;opacity:0.7;transition:opacity .2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">&larr; Portal</a>

  <header>
    <h1><span>Equity</span> Research</h1>
    <div class="subtitle">個股基本面研究報告</div>
  </header>

  <!-- US Stocks -->
  <div class="market-group">
    <div class="market-label">US Stocks</div>
    <div class="ticker-grid">
      <a class="ticker-card" href="US/SNDK/fundamentals.html">
        <div class="ticker-symbol">SNDK</div>
        <div class="ticker-name">Sandisk Corp</div>
        <div class="ticker-tags">
          <span class="tag wip">WIP</span>
          <span class="tag">NAND Flash</span>
        </div>
      </a>
      <!-- 新增標的範例：
      <a class="ticker-card" href="US/MU/fundamentals.html">
        <div class="ticker-symbol">MU</div>
        <div class="ticker-name">Micron Technology</div>
        <div class="ticker-tags">
          <span class="tag wip">WIP</span>
          <span class="tag">DRAM / NAND</span>
        </div>
      </a>
      -->
    </div>
  </div>

  <!-- TW Stocks -->
  <div class="market-group">
    <div class="market-label">TW Stocks</div>
    <div class="ticker-grid">
      <div style="font-size:0.85rem; color:#B0A0A2; font-style:italic; padding:0.5rem;">
        尚無標的
      </div>
    </div>
  </div>

  <footer>Equity Research Portal</footer>

</div>
</body>
</html>
